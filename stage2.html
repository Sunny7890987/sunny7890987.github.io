<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>stage2</title>
  <style>
    body { font-family: monospace; max-width: 960px; margin: 24px auto; }
    pre { background: #111; color: #0f0; padding: 16px; min-height: 220px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>stage2</h1>
  <pre id="log"></pre>

  <script>
    const qs = new URLSearchParams(location.search);
    const target = qs.get('target') || '';
    const backCount = parseInt(qs.get('backCount') || '1', 10);
    const extraPushes = parseInt(qs.get('extraPushes') || '0', 10);
    const backDelay = parseInt(qs.get('backDelay') || '1000', 10);
    const seq = qs.get('seq') || '0';
    const logBox = document.getElementById('log');

    function post(data) {
      try {
        window.opener?.postMessage({ from: 'stage2', seq, ...data }, '*');
      } catch {}
    }

    function log(...args) {
      const line = `[${new Date().toISOString()}] ` + args.join(' ');
      console.log(line);
      logBox.textContent += line + '\n';
      post({ line });
    }

    window.addEventListener('beforeunload', () => {
      post({ kind: 'beforeunload' });
    });

    window.addEventListener('pagehide', (e) => {
      post({ kind: 'pagehide', persisted: e.persisted });
    });

    window.addEventListener('pageshow', (e) => {
      post({ kind: 'pageshow', persisted: e.persisted });
    });

    document.addEventListener('visibilitychange', () => {
      post({ kind: 'visibilitychange', visibilityState: document.visibilityState });
    });

    log('entered stage2');
    log('location = ' + location.href);
    log('target = ' + target);
    log('history.length = ' + history.length);

    for (let i = 0; i < extraPushes; i++) {
      history.pushState({ i, seq }, '', '#p' + i);
      log('pushState #' + i);
    }

    window.name = 'polyu_stage2_' + seq;
    log('window.name = ' + window.name);

    setTimeout(() => {
      log('history.go(' + (-backCount) + ')');
      history.go(-backCount);
    }, backDelay);

    setTimeout(() => {
      log('fallback timeout reached; still on stage2');
    }, 4000);
  </script>
</body>
</html>
